version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: hormisur_db
    restart: always

    env_file:
      - .env

    volumes:
      - db_data:/var/lib/mysql


  backend:
    build: ./backend/demo
    container_name: hormisur_backend
    restart: always

    env_file:
      - .env

    depends_on:
      - db


  frontend:
    build: ./frontend
    container_name: hormisur_frontend
    restart: always

    depends_on:
      - backend


  nginx:
    image: nginx:latest
    container_name: hormisur_nginx
    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - frontend
      - backend


volumes:
  db_data: